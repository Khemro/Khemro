<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blog Post Card</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="blog-post-card">
        <img class="post-img" src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg" alt="A beautiful scenic cover photo">

        <div class="post-content">
            <h2 class="post-title">Exploring the World of CSS</h2>
            <p class="post-excerpt">
                Learning how to style cards is a fundamental skill for any web developer. 
                From margins to padding, every detail counts in creating a great UI.
            </p>
            <a href="#" class="read-more">Read More</a>
        </div>
    </div>

</body>
</html>
