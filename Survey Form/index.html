<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
    <h1 id="title">This is a form</h1>
    <p id="description">This is a form</p>
    <form id="survey-form">
        <label id="name-label">Name:</label>
        <input id="name" type="text" required placeholder="e.g. Jane Doe"> <br>

        <label id="email-label">Email:</label>
        <input id="email" type="email" placeholder="example@mail.com" required><br>

        <label id="number-label">Number: </label> 
        <input id="number" type="number" placeholder="Enter number" required min="12" max="50">
        <select id="dropdown">
          <option value="">Select an option</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
        <p>How would you like to be contacted?</p>
        <label id="Radio"> 
           <input id="radio" type="radio" value="number" name="contact"> Phone Number
        </label>
        <label>
           <input id="radio" type="radio" value="email" name="contact"> Email
        </label><br>
        <input id="checkbox" type="checkbox" value="subscribe-news"> Subscribe to news 
        <input id="checkbox" type="checkbox" value="agree-to-term" required> I agrees to the term 
        <br>
        <textarea></textarea><br>
        <button id="submit" required>Submit</button>
    </form>

  </body>
</html>
