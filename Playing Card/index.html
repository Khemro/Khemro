<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <style>
    #playing-cards{
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
    }

    .card{
        display: flex;
        justify-content: space-between;
        width: 100px;
        height: 150px;
    }

    .left{
        display: flex;
        align-self: flex-start;

    }
    .middle{
        display: flex;
        align-self: center;
        flex-direction: column;
    }

    .right{
        display: flex;
        align-self: flex-end;
    }
  </style>

</head>

<body>
    <main id = "playing-cards">
        <div class="card">
            <div class="left"></div>
            <div class="middle"></div>
            <div class="right"></div>
        </div>
        <div class="card">
            <div class="left"></div>
            <div class="middle"></div>
            <div class="right"></div>
        </div>
        <div class="card">
            <div class="left"></div>
            <div class="middle"></div>
            <div class="right"></div>
        </div>

    </main>
</body>

</html>
